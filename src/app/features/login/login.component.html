<div class="login-container">
  <div class="login-box panel-oscuro">
    
    <div class="login-header">
      <div class="logo-box">A</div>
      <h1>ANJPT OS</h1>
      <p>SISTEMA DE GESTIÓN // ACCESO RESTRINGIDO</p>
    </div>

    <form (submit)="onLogin($event)">
      <div class="form-group">
        <label>IDENTIFICACIÓN DE USUARIO (EMAIL)</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="usuario@anjpt.os" class="form-control">
      </div>

      <div class="form-group">
        <label>CLAVE DE ACCESO</label>
        <input type="password" [(ngModel)]="password" name="password" required placeholder="••••••••" class="form-control">
      </div>

      <div class="login-actions">
        <button type="submit" class="btn-neon" [disabled]="loading">
          {{ loading ? 'AUTENTICANDO...' : 'INICIAR SESIÓN' }}
        </button>
      </div>
    </form>

    <div class="login-footer">
      <p>¿No tienes acceso? <a routerLink="/register">Solicitar registro</a></p>
    </div>
    
  </div>
</div>
